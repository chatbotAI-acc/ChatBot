<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
            background: #f5f7fa;
        }

        .sidebar {
            width: 200px;
            background: #1f2937;
            padding: 20px;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .ticket {
            background: white;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            transition: 0.2s;
        }

        .ticket:hover {
            transform: scale(1.01);
        }

        button {
            margin-top: 5px;
            padding: 5px;
            cursor: pointer;
        }

        /* sidebar logo img */
        .sidebar img {
            width: 120px;
            display: block;
        }

        /*online status*/
        df-messenger::part(titlebar) {
            position: relative;
        }

        df-messenger::part(titlebar)::before {
            content: "●";
            color: #22c55e;
            position: absolute;
            right: 10px;
            top: 12px;
            font-size: 14px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="{{ url_for('static', filename='logo.png') }}">
    </div>

    <!-- Main -->
    <div class="main">
        <h3>Tickets</h3>
        <div id="list">Loading...</div>
    </div>

    <!-- Chatbot -->
    <df-messenger
        intent="WELCOME"
        chat-title="AssistIQ"
        agent-id="442500e9-80d0-4178-a68d-86463fc42db7"
        language-code="en">
    </df-messenger>

    <script>
        async function load() {
            let res = await fetch('/tickets');
            let data = await res.json();
            let div = document.getElementById("list");

            if (data.length === 0) {
                div.innerHTML = "No tickets";
                return;
            }

            div.innerHTML = "";

            data.forEach(t => {

                let color = "green";
                if (t.status === "Open") color = "red";
                if (t.status === "Pending") color = "orange";

                div.innerHTML += `
                    <div class="ticket">
                        <b>${t.id}</b><br>
                        ${t.type}<br>
                        <span style="color:${color}">${t.status}</span><br>

                        ${t.status !== "Closed" ? `
                        <button onclick="update('${t.id}','Pending')">Pending</button>
                        <button onclick="update('${t.id}','Closed')">Close</button>
                        ` : ""}
                    </div>
                `;
            });
        }

        async function update(id, status) {
            await fetch('/update_ticket', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, status})
            });
            load();
        }

        setInterval(load, 3000);
        load();
    </script>

</body>
</html>
