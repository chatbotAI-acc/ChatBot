<!DOCTYPE html>
<html>
<head>
    <title>AssistIQ Dashboard</title>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f7fa;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            padding: 20px;
        }

        .logo {
            width: 150px;
            display: block;
            margin-bottom: 10px;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 30px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-left h1 {
            margin: 0;
            font-size: 24px;
        }

        .header-left p {
            margin: 5px 0 0;
            color: #6b7280;
            font-size: 14px;
        }

        /* Online badge (glow) */
        .status {
            background: #d1fae5;
            color: #065f46;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.7);
        }

        /* Tickets */
        .ticket {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
        }

        .id {
            font-weight: bold;
            color: #2563eb;
        }

        .type {
            font-size: 14px;
            color: #555;
        }

        .status-tag {
            font-size: 13px;
            margin-top: 5px;
        }

        button {
            margin-top: 8px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .pending { background: #facc15; }
        .close { background: #22c55e; color: white; }

        /* Chatbot */
        df-messenger {
            --df-messenger-button-titlebar-color: #2563eb;
            --df-messenger-user-message: #2563eb;
        }

    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    </div>

    <!-- Main -->
    <div class="main">

        <div class="header">
            <div class="header-left">
                <h1>Support Center</h1>
                <p>Track and manage your service requests</p>
            </div>

            <div class="status">● Online</div>
        </div>

        <!-- Tickets -->
        <div id="list">Loading...</div>

    </div>

    <!-- Chatbot -->
    <df-messenger
        intent="WELCOME"
        chat-title="AssistIQ"
        agent-id="442500e9-80d0-4178-a68d-86463fc42db7"
        language-code="en">
    </df-messenger>

    <script>
        async function load() {
            let res = await fetch('/tickets');
            let data = await res.json();
            let div = document.getElementById("list");

            if (data.length === 0) {
                div.innerHTML = "No active tickets 👍";
                return;
            }

            div.innerHTML = "";

            data.forEach(t => {

                let color = "#22c55e";
                if (t.status === "Open") color = "#ef4444";
                if (t.status === "Pending") color = "#f59e0b";

                div.innerHTML += `
                    <div class="ticket">
                        <div class="id">${t.id}</div>
                        <div class="type">${t.type}</div>
                        <div class="status-tag" style="color:${color}">
                            ${t.status}
                        </div>

                        ${t.status !== "Closed" ? `
                        <button class="pending" onclick="update('${t.id}','Pending')">Pending</button>
                        <button class="close" onclick="update('${t.id}','Closed')">Close</button>
                        ` : ""}
                    </div>
                `;
            });
        }

        async function update(id, status) {
            await fetch('/update_ticket', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, status})
            });
            load();
        }

        setInterval(load, 3000);
        load();
    </script>

</body>
</html>
