<!DOCTYPE html>
<html>
<head>
    <title>AssistIQ</title>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f7fa;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #1f2937;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .status {
            color: #22c55e;
            font-size: 12px;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
        }

        .tickets {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .ticket {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        .ticket:last-child {
            border-bottom: none;
        }

        .ticket-id {
            font-weight: bold;
            color: #2563eb;
        }

        .ticket-type {
            color: #555;
            font-size: 14px;
        }

        .ticket-status {
            font-size: 13px;
            margin-top: 5px;
        }

        .actions { 
            margin-top: 10px;
        }

        .actions button {
            margin-right: 5px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .pending-btn {
            background: #ffc107;
        }

        .close-btn {
            background: #28a745;
            color: white;
        }

        df-messenger {
  --df-messenger-button-titlebar-color: #ffc107;
  --df-messenger-chat-background-color: #000000;

  --df-messenger-bot-message: #ffc107;
  --df-messenger-font-color: #ffffff;

  --df-messenger-user-message: #000000;;

  border: none;
  background: transparent;
  box-shadow: none;
}

/* Optional: better contrast */
df-messenger::part(bot-message) {
  color: white;
}

df-messenger::part(user-message) {
  color: white;
}
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>AssistIQ</h2>
        <p>Support Dashboard</p>
        <p class="status">● Online</p>
    </div>

    <!-- Main -->
    <div class="main">
        <h2>Support Tickets</h2>

        <div class="tickets" id="ticketList">
            Loading tickets...
        </div>
    </div>

    <!-- Chatbot -->
    <df-messenger
        intent="WELCOME"
        chat-title="AssistIQ"
        agent-id="442500e9-80d0-4178-a68d-86463fc42db7"
        language-code="en">
    </df-messenger>

    <script>
        async function loadTickets() {
            let res = await fetch('/tickets');
            let data = await res.json();

            let container = document.getElementById("ticketList");

            if (data.length === 0) {
                container.innerHTML = "<div class='ticket'>No active tickets</div>";
                return;
            }

            container.innerHTML = "";

            data.forEach(t => {

                let color = "#16a34a";

                if (t.status === "Open") color = "#ef4444";
                if (t.status === "Pending") color = "#f59e0b";
                if (t.status === "Closed") color = "#22c55e";

                container.innerHTML += `
                    <div class="ticket">
                        <div class="ticket-id">${t.id}</div>
                        <div class="ticket-type">${t.type}</div>
                        <div class="ticket-status" style="color:${color}">
                            Status: ${t.status}
                        </div>

                        <div class="actions">
                            <button class="pending-btn" onclick="updateStatus('${t.id}','Pending')">Pending</button>
                            <button class="close-btn" onclick="updateStatus('${t.id}','Closed')">Close</button>
                        </div>
                    </div>
                `;
            });
        }

        async function updateStatus(id, status) {
            await fetch('/update_ticket', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id, status: status})
            });

            loadTickets();
        }

        setInterval(loadTickets, 3000);
        loadTickets();
    </script>

</body>
</html>
