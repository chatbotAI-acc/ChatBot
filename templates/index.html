<!DOCTYPE html>
<html>
<head>
    <title>AssistIQ Dashboard</title>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            background: #f3f4f6;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #111827;
            padding: 20px;
        }

        .logo {
            width: 130px;
            background: rgba(255,255,255,0.08);
            padding: 8px;
            border-radius: 8px;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 30px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Ticket Card */
        .ticket {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .id {
            font-weight: bold;
            color: #2563eb;
        }

        .type {
            font-size: 14px;
            color: #555;
        }

        .status-tag {
            font-size: 13px;
            margin-top: 5px;
        }

        button {
            margin-top: 8px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .pending { background: #facc15; }
        .close { background: #22c55e; color: white; }

        /* Chatbot Theme */
        df-messenger {
            --df-messenger-button-titlebar-color: #2563eb;
            --df-messenger-chat-background-color: #f9fafb;
            --df-messenger-user-message: #2563eb;
        }

        /* Replace floating icon */
        df-messenger::part(chat-button) {
            background-image: url("{{ url_for('static', filename='icon.png') }}");
            background-size: cover;
        }

        /* HEADER UPGRADE */
        df-messenger::part(titlebar) {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 50px;
            position: relative;
        }

        /* Bot icon in header */
        df-messenger::part(titlebar)::before {
            content: "";
            background-image: url("{{ url_for('static', filename='icon.png') }}");
            background-size: cover;
            width: 26px;
            height: 26px;
            position: absolute;
            left: 12px;
            top: 10px;
            border-radius: 50%;
        }

        /* Online text */
        df-messenger::part(titlebar)::after {
            content: "Online";
            font-size: 11px;
            color: #9ca3af;
            margin-top: 2px;
        }

        /* Green blinking online status dot */
        df-messenger::part(titlebar) span::before {
            content: "●";
            color: #22c55e;
            margin-right: 4px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    </div>

    <!-- Main -->
    <div class="main">
        <div class="title">Support Tickets</div>
        <div id="list">Loading...</div>
    </div>

    <!-- Chatbot -->
    <df-messenger
        intent="WELCOME"
        chat-title="AssistIQ"
        agent-id="442500e9-80d0-4178-a68d-86463fc42db7"
        language-code="en">
    </df-messenger>

    <script>
        async function load() {
            let res = await fetch('/tickets');
            let data = await res.json();
            let div = document.getElementById("list");

            if (data.length === 0) {
                div.innerHTML = "No active tickets 👍";
                return;
            }

            div.innerHTML = "";

            data.forEach(t => {

                let color = "#22c55e";
                if (t.status === "Open") color = "#ef4444";
                if (t.status === "Pending") color = "#f59e0b";

                div.innerHTML += `
                    <div class="ticket">
                        <div class="id">${t.id}</div>
                        <div class="type">${t.type}</div>
                        <div class="status-tag" style="color:${color}">
                            ${t.status}
                        </div>

                        ${t.status !== "Closed" ? `
                        <button class="pending" onclick="update('${t.id}','Pending')">Pending</button>
                        <button class="close" onclick="update('${t.id}','Closed')">Close</button>
                        ` : ""}
                    </div>
                `;
            });
        }

        async function update(id, status) {
            await fetch('/update_ticket', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, status})
            });
            load();
        }

        setInterval(load, 3000);
        load();
    </script>

</body>
</html>
