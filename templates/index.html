<!DOCTYPE html>
<html>
<head>
<title>AssistIQ</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #0d6efd;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar div {
    margin: 15px 0;
}

/* Main Chat Area */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    border-bottom: 1px solid #ddd;
    font-size: 20px;
    display: flex;
    justify-content: space-between;
}

.status {
    color: green;
}

/* Chat */
.chat-container {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f5f5f5;
}

.message {
    margin: 10px 0;
    max-width: 60%;
    padding: 12px;
    border-radius: 12px;
}

.user {
    background: #0d6efd;
    color: white;
    margin-left: auto;
}

.bot {
    background: white;
    border: 1px solid #ddd;
}

/* Input */
.input-box {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px 15px;
    background: #0d6efd;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>AssistIQ</h2>
    <div onclick="newChat()">New Conversation</div>
    <div onclick="showTickets()">My Tickets</div>
    <div>Help</div>
</div>

<!-- Main -->
<div class="main">

    <div class="header">
        AssistIQ – AI Chatbot
        <span class="status">● Online</span>
    </div>

    <div id="chat" class="chat-container">
        <div class="message bot">
            Hi! I'm AssistIQ. How can I help you today?
        </div>
    </div>

    <div class="input-box">
        <input id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function newChat() {
    document.getElementById("chat").innerHTML =
        '<div class="message bot">Hi! I\\'m AssistIQ. How can I help you?</div>';
}

async function showTickets() {
    let chat = document.getElementById("chat");

    let response = await fetch("/tickets");
    let data = await response.json();

    chat.innerHTML = "<h3>Your Tickets:</h3>";

    if (data.length === 0) {
        chat.innerHTML += "<p>No tickets found</p>";
        return;
    }

    data.forEach(ticket => {
        chat.innerHTML += `
            <div class="message bot">
                Ticket ID: ${ticket.id} <br>
                Type: ${ticket.type}
            </div>
        `;
    });
}

async function sendMessage() {
    let input = document.getElementById("userInput").value;
    let chat = document.getElementById("chat");

    if (!input) return;

    chat.innerHTML += `<div class="message user">${input}</div>`;

    let response = await fetch("/webhook", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            queryResult: {
                intent: { displayName: input.toLowerCase() }
            }
        })
    });

    let data = await response.json();

    chat.innerHTML += `<div class="message bot">${data.fulfillmentText}</div>`;

    document.getElementById("userInput").value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
